name: Deploy Vercel Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate Vercel secrets
        run: |
          [ -n "$VERCEL_TOKEN" ] || (echo "Missing GitHub secret: VERCEL_TOKEN" && exit 1)
          [ -n "$VERCEL_ORG_ID" ] || (echo "Missing GitHub secret: VERCEL_ORG_ID" && exit 1)
          [ -n "$VERCEL_PROJECT_ID" ] || (echo "Missing GitHub secret: VERCEL_PROJECT_ID" && exit 1)

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        run: vercel deploy --prod --token="$VERCEL_TOKEN"
